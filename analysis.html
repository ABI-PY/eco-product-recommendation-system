<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analyze Product</title>

<style>
/* -------- RESET -------- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, sans-serif;
}

/* -------- PAGE BACKGROUND -------- */
body{
    min-height:100vh;
    background: url('/static/bg.jfif') no-repeat center center fixed;
    background-size: cover;

    display:flex;
    justify-content:center;  /* horizontal center */
    align-items:center;      /* vertical center */
}

/* -------- GLASS CONTAINER -------- */
.container{
    width:380px;
    padding:30px;
    text-align:center;

    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
    color:white;
}

/* -------- TITLE -------- */
.container h2{
    margin-bottom:20px;
}

/* -------- ERROR -------- */
.error{
    background:rgba(255,80,80,0.3);
    padding:8px;
    border-radius:8px;
    margin-bottom:15px;
}

/* -------- INPUT -------- */
input[type=url]{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:15px;
}

/* -------- BUTTON -------- */
button{
    margin-top:18px;
    width:55%;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#2ecc71;
    color:#1e1e1e;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#27ae60;
    transform:scale(1.05);
}

/* -------- TIP -------- */
p{
    margin-top:18px;
    font-size:13px;
    opacity:0.9;
}
</style>
</head>

<body>
    <div class="container">
        <h2>🔍 Analyze Product URL</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <input type="url" name="url" placeholder="Enter Product URL" required>
            <button type="submit">Analyze</button>
        </form>

        <p>
            Tip: Enter the exact product URL to get accurate sustainability insights.
        </p>
    </div>

</body>
</html>
